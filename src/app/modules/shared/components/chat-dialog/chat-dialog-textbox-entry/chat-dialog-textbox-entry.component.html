<textarea class="chat-dialog-textbox__input"
          #textbox
          [value]="value"
          rows="1"
          (input)="onInput(textbox.value)"
          appTextAreaAutoSize
          [disabled]="disabled"
          (keyup)="onKeyUp($event.key)"
          (keydown)="onKeyDown($event.key)"></textarea>
<button mat-mini-fab [disabled]="disabled" (click)="onSendBtnClick()">
  <mat-icon>
    send
  </mat-icon>
</button>
